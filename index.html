<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- This helps the website adjust properly on mobile and tablet screens -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>My Laundry Service</title>

  <!-- Linking external CSS file -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ================= Navbar ================= -->
  <!-- I used flexbox here to align logo, links and username properly -->
  <nav class="navbar">

    <!-- Logo of laundry service -->
    <a href="#" class="logo">
      <img src="CSS3/i/images.png" alt="Laundry Logo">
    </a>

    <!-- Navigation links -->
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">About Us</a></li>
      <li><a href="#">Contact</a></li>
    </ul>

    <!-- Username/Login button -->
    <button class="login-btn">Username</button>

  </nav>


  <!-- ================= Hero Section ================= -->
  <!-- This section shows main content of the website -->
  <section class="hero">

    <!-- Text content -->
    <div class="hero-text">

      <h1>
        Revitalize Your <br>
        Clothes with Expert <br>
        <span>Laundry Services!!</span>
      </h1>

      <p>
        From premium dry cleaning to quick wash-and-fold,
        we provide the best laundry care.
        Schedule a pickup and keep your clothes fresh.
      </p>

      <!-- Call to action button -->
      <button class="cta-btn"><span>Book a Service Today</span></button>

    </div>


    <!-- Laundry image -->
    <div class="hero-image">
      <img src="https://cdn-icons-png.flaticon.com/512/1046/1046857.png" alt="Laundry Icon">
    </div>

  </section>

</body>
</html>
